name: CI

# Fast quality gate that runs on EVERY change (FR-013, SC-005). It performs
# PSScriptAnalyzer linting + Pester v5 tests and produces the repository/tooling
# SBOM. It NEVER downloads or builds a Windows image (that is build-image.yml).
#
# Supply-chain (constitution v1.1.0, Principle VII): every `uses:` is pinned by
# commit SHA; renovate.json5 keeps the digests current.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (Pester v5 + PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install PowerShell modules (Pester v5 + PSScriptAnalyzer)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -MaximumVersion 5.9999.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -MinimumVersion 1.21.0 -Force -Scope CurrentUser

      - name: PSScriptAnalyzer (our code only; vendored Fido excluded)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $targets = @('./src', './tests', './build.ps1')
          $findings = foreach ($t in $targets) {
              Invoke-ScriptAnalyzer -Path $t -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          }
          if ($findings) { $findings | Format-Table -AutoSize | Out-String | Write-Host }
          $blocking = @($findings | Where-Object { $_.Severity -in @('Error', 'Warning') })
          if ($blocking.Count -gt 0) {
              throw "PSScriptAnalyzer found $($blocking.Count) blocking finding(s)."
          }
          Write-Host 'PSScriptAnalyzer: no blocking findings.'

      - name: Pester v5 (unit tests + catalog documentation gate)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -MinimumVersion 5.5.0 -MaximumVersion 5.9999.0 -Force
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $false
          $cfg.Run.PassThru = $true
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputFormat = 'NUnitXml'
          $cfg.TestResult.OutputPath = 'tests/TestResults.xml'
          $cfg.Output.Verbosity = 'Detailed'
          $result = Invoke-Pester -Configuration $cfg

          # Native GitHub job summary (Markdown table) — no extra action/dependency needed;
          # shows up directly on the run page instead of being buried in a downloaded artifact.
          $icon = if ($result.FailedCount -eq 0) { '✅' } else { '❌' }
          @(
              "## $icon Pester Test Results"
              ''
              '| Metric | Count |'
              '| --- | --- |'
              "| Total | $($result.TotalCount) |"
              "| ✅ Passed | $($result.PassedCount) |"
              "| ❌ Failed | $($result.FailedCount) |"
              "| ⏭️ Skipped | $($result.SkippedCount) |"
              "| ⏱️ Duration | $($result.Duration) |"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          # Inline annotations for failures (surfaces on the PR "Files changed" / Checks tab).
          if ($result.FailedCount -gt 0) {
              "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              "### ❌ Failed tests" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              foreach ($test in $result.Failed) {
                  $message = $test.ErrorRecord.Exception.Message -replace '\r?\n', ' '
                  $file = $test.ScriptBlock.File
                  $line = $test.ScriptBlock.StartPosition.StartLine
                  "- **$($test.ExpandedPath)** — $message" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
                  Write-Host "::error file=$file,line=$line::$($test.ExpandedPath): $message"
              }
          }

          if ($result.FailedCount -gt 0) {
              throw "Pester reported $($result.FailedCount) failing test(s)."
          }

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pester-results
          path: tests/TestResults.xml
          if-no-files-found: warn

      - name: Generate repository SBOM (CycloneDX)
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: repo-sbom.cyclonedx.json
