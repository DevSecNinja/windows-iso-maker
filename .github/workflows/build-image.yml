name: Build Windows 11 Image

# Release image build. Runs MANUALLY only (workflow_dispatch) — NEVER on push/PR
# (FR-012, US2 scenario 4). Builds amd64 and arm64 in a matrix using the SAME
# shipped build path as local runs (build.ps1 -> Invoke-IsoBuild; FR-010,
# Principle V). Defaults to Home (the only edition Fido can download); non-Home
# editions require a business/volume ISO URL (iso_url_amd64 / iso_url_arm64) and
# are rejected fast by the pre-flight step if none is supplied. Produces a
# compressed ISO artifact, SHA256SUMS, a RunReport, an Image BOM, and SLSA build
# provenance, then publishes to Azure Blob (optional, OIDC) or falls back to a
# workflow artifact.
#
# Supply-chain (constitution v1.1.0, Principle VII): every `uses:` is pinned by
# commit SHA; renovate.json5 keeps the digests current.

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Windows edition. Home builds from the auto-downloaded consumer ISO; every other edition (Pro/Education/Enterprise/...) needs a business ISO URL below.'
        type: string
        default: 'Home'
      language:
        description: 'Display language (e.g. en-US)'
        type: string
        default: 'en-US'
      release:
        description: 'Windows release (e.g. latest, 24H2)'
        type: string
        default: 'latest'
      iso_url_amd64:
        description: 'URL to a business (volume) amd64 base ISO. REQUIRED for non-Home amd64 builds (Fido cannot fetch it); ignored for Home. Prefer a short-lived SAS URL.'
        type: string
        default: ''
      iso_url_arm64:
        description: 'URL to a business (volume) arm64 base ISO. REQUIRED for non-Home arm64 builds; ignored for Home. Prefer a short-lived SAS URL.'
        type: string
        default: ''
      profile:
        description: 'Catalog profile subset'
        type: choice
        options:
          - minimal
          - default
          - aggressive
        default: 'default'
      enable_catalog_id:
        description: 'Comma-separated catalog ids to force-enable (e.g. remove-edge,remove-onedrive,feature-wsl)'
        type: string
        default: ''
      disable_catalog_id:
        description: 'Comma-separated catalog ids to force-disable'
        type: string
        default: ''
      skip_heavy_build:
        description: 'Preview only: resolve config + report changes, do NOT download/build the ISO'
        type: boolean
        default: false
      boot_test:
        description: 'Run the opt-in VM boot validation (requires nested virtualization)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write        # OIDC for provenance attestation + azure/login
  attestations: write    # actions/attest-build-provenance

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: windows-latest
          - arch: arm64
            runs-on: windows-11-arm   # native Windows-on-ARM runner (FR-004, Principle IV)
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate inputs (pre-flight; fail fast before ADK install / ISO download)
        id: preflight
        shell: pwsh
        env:
          WINDOWS_PRODUCT_KEY: ${{ secrets.WINDOWS_PRODUCT_KEY }}
          EDITION: ${{ inputs.edition }}
          LANGUAGE: ${{ inputs.language }}
          RELEASE: ${{ inputs.release }}
          ISO_URL_AMD64: ${{ inputs.iso_url_amd64 }}
          ISO_URL_ARM64: ${{ inputs.iso_url_arm64 }}
          ENABLE_CATALOG_ID: ${{ inputs.enable_catalog_id }}
          DISABLE_CATALOG_ID: ${{ inputs.disable_catalog_id }}
        run: |
          $ErrorActionPreference = 'Stop'
          $errs = New-Object System.Collections.Generic.List[string]

          $edition   = if ($env:EDITION)  { $env:EDITION.Trim() }  else { '' }
          $language  = if ($env:LANGUAGE) { $env:LANGUAGE.Trim() } else { '' }
          $release   = if ($env:RELEASE)  { $env:RELEASE.Trim() }  else { '' }
          $arch      = '${{ matrix.arch }}'
          $skipHeavy = '${{ inputs.skip_heavy_build }}' -eq 'true'
          $isoUrl    = if ($arch -eq 'arm64') { $env:ISO_URL_ARM64 } else { $env:ISO_URL_AMD64 }
          $isoUrl    = if ($isoUrl) { $isoUrl.Trim() } else { '' }

          # --- Basic field checks ---
          if ([string]::IsNullOrWhiteSpace($edition))  { $errs.Add('edition must not be empty.') }
          if ([string]::IsNullOrWhiteSpace($release))  { $errs.Add('release must not be empty.') }
          if ([string]::IsNullOrWhiteSpace($language)) {
              $errs.Add('language must not be empty.')
          } elseif ($language -notmatch '^[A-Za-z]{2,3}(-[A-Za-z0-9]{2,8})*$') {
              $errs.Add("language '$language' is not a valid BCP-47 tag (e.g. en-US).")
          }

          # --- Catalog id shape + enable/disable conflict ---
          function Split-Ids([string]$raw) { $raw -split '[,;]' | ForEach-Object { $_.Trim() } | Where-Object { $_ } }
          $enableIds  = Split-Ids $env:ENABLE_CATALOG_ID
          $disableIds = Split-Ids $env:DISABLE_CATALOG_ID
          foreach ($id in @($enableIds + $disableIds)) {
              if ($id -notmatch '^[A-Za-z0-9][A-Za-z0-9._-]*$') { $errs.Add("catalog id '$id' is malformed (expected e.g. remove-edge).") }
          }
          $conflicts = @($enableIds | Where-Object { $disableIds -contains $_ })
          if ($conflicts.Count -gt 0) { Write-Host "::warning::Catalog id(s) in BOTH enable and disable: $($conflicts -join ', '). Disable wins." }

          # --- Consumer (Home) vs business (everything else): single source of truth in the module ---
          $family = 'business'
          if (-not [string]::IsNullOrWhiteSpace($edition)) {
              Import-Module (Join-Path $PWD 'src/WindowsIsoMaker') -Force
              $family = & (Get-Module WindowsIsoMaker) { param($e) Get-Windows11IsoFamily -Edition $e } $edition
          }
          Write-Host "Edition '$edition' -> $family family ($arch)."

          $downloadUrl = ''
          if ($family -eq 'business') {
              if ([string]::IsNullOrWhiteSpace($isoUrl)) {
                  if ($skipHeavy) {
                      Write-Host "::warning::'$edition' is a business edition needing a $arch business ISO, but iso_url_$arch is empty. Allowed because skip_heavy_build=true (preview only)."
                  } else {
                      $errs.Add("'$edition' is a business edition: Fido cannot download it, so you must supply iso_url_$arch (a $arch business/volume ISO URL). Only 'Home' builds without one.")
                  }
              } elseif ($isoUrl -notmatch '^https?://') {
                  $errs.Add("iso_url_$arch must be an http(s) URL.")
              } elseif (-not $skipHeavy) {
                  $downloadUrl = $isoUrl
              }
              if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PRODUCT_KEY)) {
                  Write-Host "::warning::No WINDOWS_PRODUCT_KEY secret set. A business ('$edition') build needs a genuine GVLK/MAK to install hands-off and activate; a keyless build may stall at the product-key page."
              }
          } elseif (-not [string]::IsNullOrWhiteSpace($isoUrl)) {
              Write-Host "::warning::iso_url_$arch is set but edition '$edition' is Home (consumer); the supplied ISO is ignored (Home downloads via Fido)."
          }

          if ($errs.Count -gt 0) {
              $msg = "Pre-flight validation failed:`n - " + ($errs -join "`n - ")
              Write-Host "::error::$msg"
              throw $msg
          }
          Write-Host 'Pre-flight validation passed.'
          "iso_url=$downloadUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install Windows ADK Deployment Tools (provides oscdimg)
        if: ${{ inputs.skip_heavy_build == false }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # ADK 'Deployment Tools' feature installs oscdimg for amd64 and arm64. On the
          # windows-11-arm runner adksetup runs under x64/x86 emulation. See docs/ci.md.
          $adkUrl = 'https://go.microsoft.com/fwlink/?linkid=2289980'  # Windows ADK (latest)
          $installer = Join-Path $env:RUNNER_TEMP 'adksetup.exe'
          Write-Host "Downloading Windows ADK installer..."
          Invoke-WebRequest -Uri $adkUrl -OutFile $installer -UseBasicParsing
          Write-Host "Installing ADK Deployment Tools (quiet)..."
          $p = Start-Process -FilePath $installer -Wait -PassThru -ArgumentList @(
            '/quiet', '/norestart', '/features', 'OptionId.DeploymentTools'
          )
          if ($p.ExitCode -ne 0) { throw "ADK install failed with exit code $($p.ExitCode)." }

      - name: Verify free disk space (fail fast; FR-019)
        if: ${{ inputs.skip_heavy_build == false }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $drive = (Get-Item -LiteralPath (Get-Location)).PSDrive.Name
          $free = (Get-PSDrive -Name $drive).Free
          $freeGb = [math]::Round($free / 1GB, 1)
          Write-Host "Free space on ${drive}: ${freeGb} GB"
          # A full build needs the base ISO (~5-7 GB) + extracted media + mounted image +
          # output ISO. Require a conservative floor; use skip_heavy_build when impractical.
          if ($free -lt 25GB) {
              throw "Insufficient free disk space (${freeGb} GB < 25 GB). Re-run with skip_heavy_build=true or use a larger runner."
          }

      - name: Download business base ISO (non-Home editions)
        if: ${{ inputs.skip_heavy_build == false && steps.preflight.outputs.iso_url != '' }}
        shell: pwsh
        env:
          ISO_URL: ${{ steps.preflight.outputs.iso_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $env:RUNNER_TEMP 'base-image.iso'
          Write-Host "Downloading business base ISO for ${{ matrix.arch }}..."
          Invoke-WebRequest -Uri $env:ISO_URL -OutFile $dest -UseBasicParsing
          $bytes = (Get-Item -LiteralPath $dest).Length
          $sizeGb = [math]::Round($bytes / 1GB, 2)
          if ($bytes -lt 1GB) { throw "Downloaded file is only ${sizeGb} GB - not a valid Windows ISO?" }
          Write-Host "Downloaded ${sizeGb} GB base ISO -> $dest"
          "BUILD_ISO_PATH=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build the image (build.ps1 runs the same Invoke-IsoBuild path as local)
        id: build
        shell: pwsh
        env:
          # Genuine product key (optional; sourced from a repo secret so it is masked and never
          # placed on a command line). Required for a hands-off non-Home 24H2 install: only Home
          # installs without a key, and the generic KMS keys fail 24H2's online validation.
          WINDOWS_PRODUCT_KEY: ${{ secrets.WINDOWS_PRODUCT_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $params = @{
              Architecture = '${{ matrix.arch }}'
              Edition      = '${{ inputs.edition }}'
              Language     = '${{ inputs.language }}'
              Release      = '${{ inputs.release }}'
              Profile      = '${{ inputs.profile }}'
          }
          if ('${{ inputs.enable_catalog_id }}'.Trim())  { $params['EnableCatalogId']  = '${{ inputs.enable_catalog_id }}'  -split '[,;]' | ForEach-Object { $_.Trim() } | Where-Object { $_ } }
          if ('${{ inputs.disable_catalog_id }}'.Trim()) { $params['DisableCatalogId'] = '${{ inputs.disable_catalog_id }}' -split '[,;]' | ForEach-Object { $_.Trim() } | Where-Object { $_ } }
          if ('${{ inputs.skip_heavy_build }}' -eq 'true') { $params['SkipHeavyBuild'] = $true }
          if ('${{ inputs.boot_test }}' -eq 'true')        { $params['BootTest']       = $true }
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_PRODUCT_KEY)) { $params['ProductKey'] = $env:WINDOWS_PRODUCT_KEY }
          if (-not [string]::IsNullOrWhiteSpace($env:BUILD_ISO_PATH))      { $params['IsoPath']    = $env:BUILD_ISO_PATH }

          ./build.ps1 @params

          # Surface the produced artifact(s) for later steps.
          $out = Join-Path (Get-Location) 'out'
          if (Test-Path $out) {
              $files = Get-ChildItem -Path $out -File | ForEach-Object { $_.FullName }
              "artifact_dir=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              Write-Host "Produced:`n$($files -join "`n")"
          }

      - name: Upload boot-test diagnostics (Windows Setup logs; always, for failed installs)
        if: ${{ always() && hashFiles('out/boottest-diagnostics/**') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: boottest-diagnostics-${{ inputs.edition }}-${{ matrix.arch }}-${{ inputs.release }}
          path: |
            out/boottest-diagnostics/**
          if-no-files-found: ignore

      - name: Attest build provenance (SLSA) for produced images
        if: ${{ inputs.skip_heavy_build == false && hashFiles('out/*.zip', 'out/*.7z', 'out/*.iso') != '' }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            out/*.zip
            out/*.7z
            out/*.iso

      - name: Azure login (federated OIDC; only when storage vars are configured)
        if: ${{ inputs.skip_heavy_build == false && vars.AZURE_STORAGE_ACCOUNT != '' && vars.AZURE_STORAGE_CONTAINER != '' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Upload artifacts to Azure Blob (durable off-box storage)
        if: ${{ inputs.skip_heavy_build == false && vars.AZURE_STORAGE_ACCOUNT != '' && vars.AZURE_STORAGE_CONTAINER != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $prefix = "windows11/${{ matrix.arch }}/${{ github.run_id }}"
          az storage blob upload-batch `
            --account-name '${{ vars.AZURE_STORAGE_ACCOUNT }}' `
            --destination '${{ vars.AZURE_STORAGE_CONTAINER }}' `
            --destination-path $prefix `
            --source out `
            --auth-mode login `
            --overwrite true

      - name: Upload workflow artifact (fallback when Azure is not configured)
        if: ${{ always() && (vars.AZURE_STORAGE_ACCOUNT == '' || vars.AZURE_STORAGE_CONTAINER == '') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Windows11-${{ inputs.edition }}-${{ matrix.arch }}-${{ inputs.release }}
          path: |
            out/**
          if-no-files-found: warn
