name: E2E Post-install

# End-to-end validation of the online post-install path (post-install.ps1 ->
# Invoke-PostInstallSetup) on a REAL Windows runner. Unlike ci.yml (unit tests
# with every external seam mocked), this workflow actually runs the shipped
# entry script against the live OS:
#   1. Preview (-WhatIf) across every profile — proves arch auto-detect, catalog
#      import/selection, elevation gate and report generation on real Windows,
#      while touching nothing (dism is not called in preview).
#   2. Real apply of the registry-only 'minimal' profile to the (ephemeral)
#      runner, then a second run — proving the writes actually persist and the
#      catalog is idempotent (applied -> already-applied), with no failures.
#
# It NEVER downloads or builds a Windows image and never removes Appx/features
# on the runner; the heavier dism appliers are covered by the mocked unit tests
# in ci.yml. Runner VMs are single-use, so the registry writes are discarded
# with the VM.
#
# Supply-chain (constitution v1.1.0, Principle VII): every `uses:` is pinned by
# commit SHA; renovate.json5 keeps the digests current.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-post-install-${{ github.ref }}
  cancel-in-progress: true

jobs:
  post-install-e2e:
    name: Post-install E2E (live Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Preview every profile (-WhatIf, touches nothing)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $profiles = 'minimal', 'default', 'aggressive', 'gaming', 'opinionated'
          $rows = foreach ($p in $profiles) {
              $out = & ./post-install.ps1 -Profile $p -WhatIf
              $report = @($out) | Where-Object { $_.PSObject.TypeNames -contains 'WindowsIsoMaker.RunReport' } | Select-Object -Last 1
              if (-not $report) { throw "Profile '$p': preview returned no RunReport object." }
              if ($report.Outcome -ne 'Preview') { throw "Profile '$p': expected Outcome=Preview, got '$($report.Outcome)'." }

              $entries = @($report.Applied) + @($report.Skipped)
              $failed = @($entries | Where-Object { "$($_.Status)" -eq 'Failed' })
              if ($failed.Count -gt 0) { throw "Profile '$p': preview must not fail any entry, but $($failed.Count) failed." }

              # -WhatIf must be a pure preview: nothing may report Status=Applied.
              $reallyApplied = @($report.Applied | Where-Object { "$($_.Status)" -eq 'Applied' })
              if ($reallyApplied.Count -gt 0) { throw "Profile '$p': preview (-WhatIf) applied $($reallyApplied.Count) entr(ies); it must change nothing." }

              [pscustomobject]@{ Profile = $p; Selected = $entries.Count; Skipped = @($report.Skipped).Count }
          }
          $rows | Format-Table -AutoSize | Out-String | Write-Host

          if (@($rows | Where-Object { $_.Selected -gt 0 }).Count -eq 0) {
              throw 'No profile selected any catalog entry — selection is broken.'
          }

          $summary = @('## Post-install preview (-WhatIf)', '', '| Profile | Selected | Skipped |', '| --- | --- | --- |')
          $summary += $rows | ForEach-Object { "| $($_.Profile) | $($_.Selected) | $($_.Skipped) |" }
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Apply 'minimal' for real + verify idempotency
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-Run([string]$label) {
              $out = & ./post-install.ps1 -Profile minimal -OutputDirectory ./out
              $report = @($out) | Where-Object { $_.PSObject.TypeNames -contains 'WindowsIsoMaker.RunReport' } | Select-Object -Last 1
              if (-not $report) { throw "$label run: no RunReport object returned." }
              if ($report.Outcome -ne 'Succeeded') { throw "$label run: expected Outcome=Succeeded, got '$($report.Outcome)'." }
              $failed = @(@($report.Applied) + @($report.Skipped) | Where-Object { "$($_.Status)" -eq 'Failed' })
              if ($failed.Count -gt 0) {
                  $detail = ($failed | ForEach-Object { "$($_.Id): $($_.Reason)" }) -join '; '
                  throw "$label run: $($failed.Count) entr(ies) failed to apply -> $detail"
              }
              return $report
          }

          # 'minimal' is registry-only (no dism), so applying it to the ephemeral
          # runner is safe and fast; the VM is discarded afterwards.
          $first = Invoke-Run 'First'
          $applied1 = @($first.Applied | Where-Object { "$($_.Status)" -eq 'Applied' })
          $selected = @($first.Applied) + @($first.Skipped)
          if ($selected.Count -eq 0) { throw "'minimal' selected zero entries; expected registry tweaks." }
          Write-Host "First apply: $($applied1.Count) newly applied of $($selected.Count) selected."

          # Second run: every entry the first run APPLIED must now read back as
          # AlreadyApplied (proving the writes persisted) and nothing may be
          # freshly Applied again (proving idempotency).
          $second = Invoke-Run 'Second'
          $applied2 = @($second.Applied | Where-Object { "$($_.Status)" -eq 'Applied' })
          if ($applied2.Count -gt 0) {
              $ids = ($applied2 | ForEach-Object { $_.Id }) -join ', '
              throw "Second apply re-applied $($applied2.Count) entr(ies) ($ids); the catalog is not idempotent online."
          }
          $already2 = @($second.Applied | Where-Object { "$($_.Status)" -eq 'AlreadyApplied' })
          Write-Host "Second apply: 0 newly applied, $($already2.Count) already-applied (idempotent)."

          $already1 = @($first.Applied | Where-Object { "$($_.Status)" -eq 'AlreadyApplied' })
          @(
              '## Post-install real apply (profile: minimal)'
              ''
              '| Run | Selected | Newly applied | Already applied |'
              '| --- | --- | --- | --- |'
              "| 1st | $($selected.Count) | $($applied1.Count) | $($already1.Count) |"
              "| 2nd | $($selected.Count) | $($applied2.Count) | $($already2.Count) |"
              ''
              '✅ Writes persisted and re-application was idempotent.'
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload post-install run reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: post-install-e2e-reports
          path: out/*.json
          if-no-files-found: warn
